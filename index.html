<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PrimaryAI</title>
  <style>
    body { margin:0; font-family:"Avenir Next","Segoe UI",Tahoma,Geneva,Verdana,sans-serif; color:#0f172a; background:radial-gradient(circle at 10% 0%,#edf4ff 0%,#f4f8fb 38%); }
    .page { width:min(1240px,96vw); margin:0 auto; padding:2rem 1rem 2.5rem; text-align:center; }
    h1 { margin:0; font-family:"Avenir Next Condensed","HelveticaNeue-Thin","Arial Narrow",sans-serif; font-size:clamp(3rem,10vw,5.6rem); font-weight:100; letter-spacing:.04em; line-height:1; color:#6b91c0; }
    h1 .o { color:#f97316; }
    p { color:#64748b; }
    .device-showcase { position:relative; width:min(980px,96vw); margin:1.35rem auto 0; display:flex; align-items:flex-end; justify-content:center; }
    .laptop { width:min(700px,78vw); background:linear-gradient(to bottom,#8b95a7,#566173 58%,#2e3746); border-radius:1.2rem 1.2rem 0 0; padding:1%; }
    .screen { border-radius:.9rem; overflow:hidden; border:8px solid #0a0a0a; }
    .screen img { width:100%; display:block; }
    .phone { position:absolute; right:clamp(.3rem,2.5vw,1.2rem); bottom:clamp(.8rem,1.8vw,1.3rem); width:clamp(120px,16vw,160px); border:5px solid #0d1320; border-radius:2.4rem; padding:8px; background:#04050a; }
    .phone .screen { border-radius:1.2rem; }
  </style>
</head>
<body>
  <main class="page">
    <h1>Pr<span class="o">i</span>m<span class="o">a</span>ry<span class="o">A</span><span class="o">I</span></h1>
    <p>Our intelligent SaaS platform is currently under construction.</p>
    <div class="device-showcase">
      <div class="laptop"><div class="screen"><img src="./public/images/landing/dashboard-final.png" alt="PrimaryAI app preview" /></div></div>
      <div class="phone"><div class="screen"><img src="./public/images/landing/home-final-24s.png" alt="PrimaryAI mobile preview" /></div></div>
    </div>
  </main>
</body>
</html>
