name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build:cf
        env:
          NEXT_PUBLIC_APP_URL: https://primaryai.org.uk
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
          NEXT_PUBLIC_MICROSOFT_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_MICROSOFT_CLIENT_ID }}
      - name: Verify build output
        run: ls -la .vercel/output/static || echo "⚠️ .vercel/output/static not found"
      - name: Inject runtime vars into wrangler.toml
        run: |
          cat >> wrangler.toml << EOF

          [vars]
          NEXT_PUBLIC_APP_URL = "https://primaryai.org.uk"
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY = "${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}"
          CLERK_SECRET_KEY = "${{ secrets.CLERK_SECRET_KEY }}"
          SUPABASE_URL = "${{ secrets.SUPABASE_URL }}"
          SUPABASE_ANON_KEY = "${{ secrets.SUPABASE_ANON_KEY }}"
          SUPABASE_SERVICE_ROLE_KEY = "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
          STRIPE_SECRET_KEY = "${{ secrets.STRIPE_SECRET_KEY }}"
          STRIPE_WEBHOOK_SECRET = "${{ secrets.STRIPE_WEBHOOK_SECRET }}"
          STRIPE_PRICE_STARTER = "${{ secrets.STRIPE_PRICE_STARTER }}"
          TOKEN_ENCRYPTION_KEY = "${{ secrets.TOKEN_ENCRYPTION_KEY }}"
          GROQ_API_KEY = "${{ secrets.GROQ_API_KEY }}"
          GEMINI_API_KEY = "${{ secrets.GEMINI_API_KEY }}"
          MISTRAL_API_KEY = "${{ secrets.MISTRAL_API_KEY }}"
          COHERE_API_KEY = "${{ secrets.COHERE_API_KEY }}"
          CEREBRAS_API_KEY = "${{ secrets.CEREBRAS_API_KEY }}"
          OPENROUTER_API_KEY = "${{ secrets.OPENROUTER_API_KEY }}"
          CF_API_TOKEN = "${{ secrets.CF_API_TOKEN }}"
          CF_ACCOUNT_ID = "${{ secrets.CF_ACCOUNT_ID }}"
          HUGGINGFACE_API_KEY = "${{ secrets.HUGGINGFACE_API_KEY }}"
          HUGGINGFACE_MODEL = "${{ secrets.HUGGINGFACE_MODEL }}"
          NEXT_PUBLIC_GOOGLE_CLIENT_ID = "${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}"
          NEXT_PUBLIC_MICROSOFT_CLIENT_ID = "${{ secrets.NEXT_PUBLIC_MICROSOFT_CLIENT_ID }}"
          EOF
      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy .vercel/output/static --project-name=primaryai-web-source --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
